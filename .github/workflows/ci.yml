name: CI/CD Pipeline (3-Step Testing Suite)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint-and-format:
    name: "Step 1: Code Linting (Laravel Pint)"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
        coverage: none

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Run Style Checks
      run: ./vendor/bin/pint --test

  behavioral-tests:
    name: "Step 2: Behavioral & Functional Tests"
    runs-on: ubuntu-latest
    needs: lint-and-format

    env:
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      APP_ENV: testing
      APP_KEY: base64:4U3WF36jLFmujTJMm9MA1tvXvbjVWFPKok22DcXYNrQ=

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
        coverage: none

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Run Database Migrations
      run: php artisan migrate --force

    - name: Run Behavioral PHPUnit Tests
      run: php artisan test

  security-audit:
    name: "Step 3: Security & Loophole Audits"
    runs-on: ubuntu-latest
    needs: behavioral-tests

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
        coverage: none

    - name: Run Dependency Audit
      run: composer audit --locked
